<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎓 Lernplattform — Frankensteinschule</title>
<link rel="stylesheet" href="shared/platform.css">
<style>
/* hub-eigene Akzente */
.hub-card { border-top-width: 5px; }
.hub-intro {
  text-align: center; color: var(--text-light); font-size: .95em;
  margin: 4px 0 18px; line-height: 1.4;
}
.subjects-grid { grid-template-columns: 1fr 1fr; }
.reset-link {
  display: block; text-align: center; margin-top: 24px;
  color: var(--text-light); font-size: .8em; cursor: pointer;
  text-decoration: underline;
}
.profile-stars { font-size: .78em; color: var(--text-light); margin-top: 4px; }
.profile-progress { font-size: .72em; color: var(--text-light); margin-top: 2px; }
.current-profile-bar {
  display: flex; align-items: center; justify-content: space-between;
  background: white; border-radius: 14px; padding: 10px 16px;
  box-shadow: var(--shadow); margin-bottom: 14px; font-size: .9em;
}
.current-profile-bar .who { color: var(--text); font-weight: 600; }
.current-profile-bar button { font-size: .85em; padding: 6px 12px; }
@media(max-width: 480px) {
  .subjects-grid { grid-template-columns: 1fr; }
}
</style>
<script src="shared/engine.js"></script>
</head>
<body>
<div class="app">

  <!-- PROFIL-AUSWAHL -->
  <div id="screen-profile" class="screen active">
    <div class="top-header">
      <h1>🎓 Lernplattform</h1>
      <p>Frankensteinschule — Lernspiele & Tests</p>
    </div>
    <p class="hub-intro">Wer bist du?</p>
    <div class="profile-grid" id="profile-grid"></div>
    <div class="new-profile-box">
      <p style="margin-bottom:10px;color:var(--text-light);font-size:.9em;">Neu hier? Name eingeben:</p>
      <input type="text" id="new-profile-name" placeholder="Dein Name" maxlength="20"
             onkeydown="if(event.key==='Enter')createProfile()">
      <div style="margin-top:12px;">
        <button class="btn-main" onclick="createProfile()">Los geht's! 🚀</button>
      </div>
    </div>
    <span class="reset-link" onclick="resetAllProfiles()">Alle Profile zurücksetzen</span>
  </div>

  <!-- HUB / TESTS -->
  <div id="screen-hub" class="screen">
    <div class="top-header">
      <h2 id="hub-greeting">Hallo!</h2>
      <p>Welchen Test möchtest du üben?</p>
    </div>
    <div class="current-profile-bar">
      <span class="who" id="hub-profile-name"></span>
      <button class="btn-sec" onclick="switchProfile()">Profil wechseln</button>
    </div>
    <div class="subjects-grid" id="tests-grid"></div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const PROFILES_KEY = 'frankensteinschule_profiles_v3';
const OLD_KEY      = 'frankensteinschule_lernspiel_v2';
const SESSION_KEY  = 'lernplattform_current_profile';

const { loadProfiles: _loadProfiles, saveProfiles: _saveProfiles,
        showScreen, esc, soundClick } = window.LernEngine;

// ============================================================
// TESTS REGISTRY
// Neuer Test = ein Eintrag hier + ein Unterordner mit index.html.
// ============================================================
const TESTS = [
  {
    id: 'sachkunde',
    name: 'Sachkunde: Das Jahr',
    short: 'Wochentage · Monate · Jahreszeiten · Weltraum',
    emoji: '🌿',
    color: '#FF6B35',
    path: 'sachkunde/',
    progress: (sub, profile) => {
      // sub = profile.sachkunde — Fallback: alte flache Struktur direkt am Profil lesen,
      // damit Fortschritte schon vor der ersten Öffnung von Sachkunde sichtbar sind.
      const wp = (sub && sub.worldProgress) || (profile && profile.worldProgress);
      if (!wp) return { text: 'Noch nicht gespielt', pct: 0 };
      const completed = Object.values(wp).filter(w => w && w.completed).length;
      let answered = 0;
      Object.values(wp).forEach(w => {
        if (w && w.history) answered += Object.keys(w.history).length;
      });
      if (!answered) return { text: 'Noch nicht gespielt', pct: 0 };
      return { text: `${completed}/6 Welten · ${answered} Fragen`, pct: Math.min(100, completed / 6 * 100) };
    }
  },
  {
    id: 'deutschtest',
    name: 'Deutsch: Verben & Wortarten',
    short: 'Nomen · Verben · Personalformen · Vorsilben',
    emoji: '📚',
    color: '#E84393',
    path: 'deutschtest/',
    progress: (sub) => {
      // sub = profile.deutschtest — shape:
      //   { progress: { [examId]: { levels: { [levelId]: { history, completed } } } } }
      if (!sub || !sub.progress) return { text: 'Noch nicht gespielt', pct: 0 };
      let completedLv = 0, totalLv = 0, answered = 0;
      for (const exam of Object.values(sub.progress)) {
        const levels = (exam && exam.levels) || {};
        for (const lv of Object.values(levels)) {
          totalLv++;
          if (lv && lv.completed) completedLv++;
          if (lv && lv.history) answered += Object.keys(lv.history).length;
        }
      }
      if (!answered) return { text: 'Noch nicht gespielt', pct: 0 };
      const text = totalLv
        ? `${completedLv}/${totalLv} Stufen · ${answered} Fragen`
        : `${answered} Fragen beantwortet`;
      return { text, pct: totalLv ? completedLv / totalLv * 100 : 0 };
    }
  },
];

// ============================================================
// STATE
// ============================================================
let profiles = {};
let currentProfile = null;

function loadProfiles() { profiles = _loadProfiles(PROFILES_KEY); }
function saveProfiles() { _saveProfiles(PROFILES_KEY, profiles); }

// ============================================================
// PROFIL-SCREEN
// ============================================================
function renderProfileScreen() {
  const grid = document.getElementById('profile-grid');
  grid.innerHTML = '';
  const names = Object.keys(profiles).sort();
  names.forEach(name => {
    const card = document.createElement('div');
    card.className = 'profile-card';
    card.onclick = () => selectProfile(name);
    const safeName = esc(name);
    // Kurze Gesamtsummary über alle Tests
    let totalAnswered = 0;
    const p = profiles[name] || {};
    const sachkundeWp = (p.sachkunde && p.sachkunde.worldProgress) || p.worldProgress;
    if (sachkundeWp) {
      Object.values(sachkundeWp).forEach(w => {
        if (w && w.history) totalAnswered += Object.keys(w.history).length;
      });
    }
    card.innerHTML = `
      <button class="del-btn" onclick="event.stopPropagation(); deleteProfile('${safeName.replace(/'/g,"\\'")}')">✕</button>
      <div class="avatar">🧒</div>
      <div class="name">${safeName}</div>
      <div class="info">${totalAnswered ? totalAnswered + ' Fragen gelöst' : 'Bereit zum Start'}</div>
    `;
    grid.appendChild(card);
  });
}

function selectProfile(name) {
  soundClick();
  currentProfile = name;
  sessionStorage.setItem(SESSION_KEY, name);
  showHub();
}

function createProfile() {
  const input = document.getElementById('new-profile-name');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  if (profiles[name]) { selectProfile(name); return; }
  soundClick();
  profiles[name] = {};
  saveProfiles();
  input.value = '';
  selectProfile(name);
}

function deleteProfile(name) {
  if (!confirm(`"${name}" wirklich löschen? Alle Fortschritte (Sachkunde & Deutschtest) gehen verloren!`)) return;
  delete profiles[name];
  if (currentProfile === name) currentProfile = null;
  saveProfiles();
  renderProfileScreen();
}

function resetAllProfiles() {
  if (!confirm('Wirklich ALLE Profile und Fortschritte löschen?')) return;
  localStorage.removeItem(PROFILES_KEY);
  localStorage.removeItem(OLD_KEY);
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();
}

function switchProfile() {
  soundClick();
  currentProfile = null;
  sessionStorage.removeItem(SESSION_KEY);
  renderProfileScreen();
  showScreen('screen-profile');
}

// ============================================================
// HUB (TEST-AUSWAHL)
// ============================================================
function showHub() {
  document.getElementById('hub-greeting').textContent = `Hallo ${currentProfile}!`;
  document.getElementById('hub-profile-name').textContent = `👤 ${currentProfile}`;
  renderTests();
  showScreen('screen-hub');
}

function renderTests() {
  const grid = document.getElementById('tests-grid');
  grid.innerHTML = '';
  const profile = profiles[currentProfile] || {};
  TESTS.forEach(t => {
    const card = document.createElement('div');
    card.className = 'subject-card hub-card';
    card.style.setProperty('--col', t.color);
    card.onclick = () => openTest(t);
    const prog = t.progress(profile[t.id], profile);
    card.innerHTML = `
      <span class="sc-emoji">${t.emoji}</span>
      <h3>${esc(t.name)}</h3>
      <div class="sc-date">${esc(t.short)}</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${prog.pct}%;background:${t.color}"></div></div>
      <div class="sc-stars">${esc(prog.text)}</div>
    `;
    grid.appendChild(card);
  });
}

function openTest(t) {
  soundClick();
  const q = currentProfile ? `?profile=${encodeURIComponent(currentProfile)}` : '';
  location.href = t.path + q;
}

// ============================================================
// INIT
// ============================================================
function init() {
  loadProfiles();

  // Rückkehr von einer Sub-App? Sub-App übergibt ?profile=NAME.
  const params = new URLSearchParams(location.search);
  const fromUrl = params.get('profile');
  const fromSession = sessionStorage.getItem(SESSION_KEY);
  const preselect = fromUrl || fromSession;

  if (preselect && profiles[preselect]) {
    currentProfile = preselect;
    sessionStorage.setItem(SESSION_KEY, preselect);
    // URL aufräumen, damit Reload nicht immer den Parameter mitschleift
    if (fromUrl) history.replaceState({}, '', location.pathname);
    showHub();
    return;
  }

  renderProfileScreen();
  showScreen('screen-profile');
}
init();
</script>
</body>
</html>
