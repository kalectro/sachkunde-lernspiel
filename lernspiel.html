<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lernspiel - Das Jahr | Frankensteinschule</title>
<style>
:root {
  --primary: #FF6B35;
  --secondary: #4ECDC4;
  --success: #2ECC71;
  --error: #E74C3C;
  --warning: #F39C12;
  --bg: #FFF8E7;
  --text: #2C3E50;
  --text-light: #7F8C8D;
  --card: #FFFFFF;
  --shadow: 0 4px 15px rgba(0,0,0,0.1);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.15);
  --radius: 16px;
  --radius-sm: 10px;
  --w1: #66BB6A; --w1-light: #E8F5E9;
  --w2: #42A5F5; --w2-light: #E3F2FD;
  --w3: #FFA726; --w3-light: #FFF3E0;
  --w4: #AB47BC; --w4-light: #F3E5F5;
  --w5: #26A69A; --w5-light: #E0F2F1;
  --w6: #283593; --w6-light: #E8EAF6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden; font-size: 18px; line-height: 1.5;
}
.screen { display:none; min-height:100vh; padding:20px; max-width:700px; margin:0 auto; }
.screen.active { display:flex; flex-direction:column; align-items:center; }
h1 { font-size:28px; text-align:center; margin-bottom:10px; }
h2 { font-size:24px; text-align:center; margin-bottom:8px; }
h3 { font-size:20px; }
.subtitle { color:var(--text-light); text-align:center; font-size:16px; margin-bottom:20px; }
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:14px 28px; border:none; border-radius:var(--radius);
  font-size:20px; font-weight:700; cursor:pointer;
  transition: all 0.2s; color:white; min-width:200px;
  box-shadow: var(--shadow); text-align:center;
  -webkit-tap-highlight-color: transparent; user-select:none;
}
.btn:active { transform:scale(0.95); }
.btn-primary { background:var(--primary); }
.btn-primary:hover { background:#E85A2A; }
.btn-success { background:var(--success); }
.btn-secondary { background:var(--secondary); }
.btn-small { padding:10px 20px; font-size:16px; min-width:auto; }
.btn-outline { background:transparent; color:var(--text); border:2px solid #ddd; box-shadow:none; }
.btn-outline:hover { border-color:var(--primary); color:var(--primary); }
.btn-disabled { opacity:0.4; pointer-events:none; }
.card { background:var(--card); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); width:100%; }
input[type="text"] {
  width:100%; padding:14px 18px; border:2px solid #ddd; border-radius:var(--radius-sm);
  font-size:20px; text-align:center; outline:none; transition:border 0.2s;
}
input[type="text"]:focus { border-color:var(--primary); }

/* Character SVG */
.character-container { display:flex; flex-direction:column; align-items:center; margin:10px 0; }
.character-svg { width:100px; height:100px; }
.character-svg.small { width:60px; height:60px; }
.character-svg.tiny { width:40px; height:40px; }
.character-name { font-weight:700; font-size:14px; margin-top:4px; text-align:center; }

/* Speech Bubble */
.speech-bubble {
  position:relative; background:var(--card); border-radius:var(--radius);
  padding:16px 20px; margin:10px 0; box-shadow:var(--shadow);
  font-size:18px; text-align:center; max-width:500px; width:100%;
  animation: bubbleIn 0.4s ease-out;
}
.speech-bubble::after {
  content:''; position:absolute; bottom:-10px; left:50%;
  transform:translateX(-50%); width:0; height:0;
  border-left:10px solid transparent; border-right:10px solid transparent;
  border-top:12px solid var(--card);
}
@keyframes bubbleIn {
  from { opacity:0; transform:scale(0.8) translateY(10px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}

/* Profile Cards */
.profiles-grid { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; width:100%; margin:15px 0; }
.profile-card {
  background:var(--card); border-radius:var(--radius); padding:16px 20px;
  box-shadow:var(--shadow); cursor:pointer; transition:all 0.2s;
  text-align:center; min-width:130px; position:relative; flex:0 0 auto;
  -webkit-tap-highlight-color:transparent;
}
.profile-card:active { transform:scale(0.95); }
.profile-card:hover { box-shadow:var(--shadow-lg); }
.profile-card .profile-name { font-size:18px; font-weight:700; margin-bottom:4px; }
.profile-card .profile-stars { font-size:16px; color:var(--warning); }
.profile-card .profile-progress { font-size:12px; color:var(--text-light); margin-top:4px; }
.profile-card .profile-delete {
  position:absolute; top:4px; right:8px; font-size:16px; color:#ccc;
  cursor:pointer; padding:4px; line-height:1; z-index:2;
}
.profile-card .profile-delete:hover { color:var(--error); }
.profile-card .profile-bar {
  width:100%; height:4px; background:#eee; border-radius:2px; margin-top:6px; overflow:hidden;
}
.profile-card .profile-bar-fill { height:100%; background:var(--success); border-radius:2px; }
.new-profile-row {
  display:flex; gap:8px; width:100%; max-width:400px; margin-top:10px;
}
.new-profile-row input { flex:1; text-align:left; font-size:18px; padding:12px 16px; }
.new-profile-row .btn { min-width:auto; padding:12px 20px; }

/* Start Screen */
#start-screen { justify-content:center; gap:15px; text-align:center; padding-top:30px; }
.welcome-characters { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:10px 0; }
.title-big {
  font-size:36px; font-weight:900; background:linear-gradient(135deg,var(--primary),var(--secondary));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.school-name { font-size:16px; color:var(--text-light); font-weight:600; }

/* Map Screen */
#map-screen { padding-top:10px; }
.map-header { display:flex; justify-content:space-between; align-items:center; width:100%; margin-bottom:15px; flex-wrap:wrap; gap:8px; }
.player-info { display:flex; align-items:center; gap:8px; font-weight:700; }
.total-stars { display:flex; align-items:center; gap:4px; font-size:20px; color:var(--warning); }
.world-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; margin-bottom:15px; }
.world-card {
  background:var(--card); border-radius:var(--radius); padding:16px;
  box-shadow:var(--shadow); cursor:pointer; transition:all 0.3s;
  text-align:center; position:relative; overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  display:flex; flex-direction:column; align-items:center;
}
.world-card .world-bottom { margin-top:auto; width:100%; }
.world-card:active { transform:scale(0.97); }
.world-card.locked { opacity:0.5; pointer-events:none; filter:grayscale(0.5); }
.world-card.completed { border:3px solid var(--success); }
.world-card.mastered { border:3px solid #FFD700; background:linear-gradient(135deg,#FFFDE7,#FFF8E1); }
.world-card .world-num {
  position:absolute; top:8px; left:8px; width:28px; height:28px;
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  color:white; font-weight:900; font-size:14px;
}
.world-card .world-title { font-size:14px; font-weight:700; margin-top:4px; }
.world-card .world-subtitle { font-size:12px; color:var(--text-light); }
.world-card .world-stars { margin-top:6px; font-size:16px; }
.world-card .lock-icon {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:30px; opacity:0.6;
}
.world-progress { width:100%; height:6px; background:#eee; border-radius:3px; margin-top:8px; overflow:hidden; }
.world-progress-fill { height:100%; border-radius:3px; transition:width 0.5s; }

/* Question Screen */
#question-screen { padding-top:15px; }
.q-header { display:flex; justify-content:space-between; align-items:center; width:100%; margin-bottom:10px; flex-wrap:wrap; gap:8px; }
.q-world-badge { padding:5px 12px; border-radius:20px; color:white; font-size:13px; font-weight:700; }
.q-progress-text { font-size:14px; color:var(--text-light); font-weight:600; }
.q-progress-bar { width:100%; height:10px; background:#eee; border-radius:5px; margin-bottom:15px; overflow:hidden; }
.q-progress-fill { height:100%; border-radius:5px; transition:width 0.4s; }
.q-character-row { display:flex; align-items:flex-start; gap:12px; margin-bottom:12px; width:100%; }
.q-bubble {
  flex:1; background:var(--card); border-radius:var(--radius); padding:16px;
  box-shadow:var(--shadow); font-size:18px; font-weight:600;
  position:relative; min-height:60px; display:flex; align-items:center;
}
.q-bubble::before {
  content:''; position:absolute; left:-8px; top:20px;
  border-top:8px solid transparent; border-bottom:8px solid transparent;
  border-right:10px solid var(--card);
}
.q-options { display:flex; flex-direction:column; gap:8px; width:100%; margin:8px 0; }
.q-option {
  padding:14px 18px; background:var(--card); border:2px solid #e0e0e0;
  border-radius:var(--radius-sm); cursor:pointer; font-size:18px;
  transition:all 0.2s; text-align:left; font-weight:500;
  -webkit-tap-highlight-color:transparent; user-select:none;
}
.q-option:active { transform:scale(0.98); }
.q-option.correct { border-color:var(--success); background:#E8F8F0; color:var(--success); animation:correctPop 0.4s; }
.q-option.wrong { border-color:var(--error); background:#FDEDEC; color:var(--error); animation:shake 0.4s; }
@keyframes correctPop { 50% { transform:scale(1.03); } }
@keyframes shake { 25% { transform:translateX(-5px); } 75% { transform:translateX(5px); } }

/* Sort Question */
.sort-slots {
  display:flex; flex-wrap:wrap; gap:6px; min-height:46px;
  padding:10px; background:#f5f5f5; border-radius:var(--radius-sm);
  margin-bottom:10px; width:100%; border:2px dashed #ddd;
}
.sort-slot { padding:8px 14px; background:white; border-radius:8px; font-size:16px; font-weight:600; border:2px solid #ddd; cursor:pointer; transition:all 0.2s; }
.sort-slot:hover { border-color:var(--error); }
.sort-items { display:flex; flex-wrap:wrap; gap:6px; width:100%; }
.sort-item { padding:8px 14px; border-radius:8px; font-size:16px; font-weight:600; cursor:pointer; color:white; transition:all 0.2s; -webkit-tap-highlight-color:transparent; user-select:none; }
.sort-item:active { transform:scale(0.95); }
.sort-item.used { opacity:0.3; pointer-events:none; }

/* Fill Question */
.fill-container { width:100%; text-align:center; margin:10px 0; }
.fill-sentence { font-size:20px; font-weight:600; margin-bottom:12px; line-height:1.6; }
.fill-blank { display:inline-block; border-bottom:3px solid var(--primary); min-width:100px; padding:2px 8px; margin:0 4px; }
.fill-input { width:200px; padding:10px; border:2px solid #ddd; border-radius:8px; font-size:20px; text-align:center; font-weight:600; }
.fill-input:focus { border-color:var(--primary); outline:none; }

/* True/False */
.tf-options { display:flex; gap:10px; width:100%; }
.tf-option {
  flex:1; padding:16px; border:2px solid #e0e0e0; border-radius:var(--radius-sm);
  text-align:center; font-size:20px; font-weight:700; cursor:pointer;
  transition:all 0.2s; background:var(--card);
  -webkit-tap-highlight-color:transparent; user-select:none;
}
.tf-option:active { transform:scale(0.95); }

/* Scramble */
.scramble-display { display:flex; gap:4px; justify-content:center; flex-wrap:wrap; min-height:50px; padding:10px; margin-bottom:10px; }
.scramble-placed { width:36px; height:42px; display:flex; align-items:center; justify-content:center; background:var(--primary); color:white; border-radius:8px; font-size:20px; font-weight:700; cursor:pointer; animation:correctPop 0.3s; }
.scramble-empty { width:36px; height:42px; border:2px dashed #ccc; border-radius:8px; }
.scramble-tiles { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; }
.scramble-tile {
  width:42px; height:48px; display:flex; align-items:center; justify-content:center;
  background:var(--card); border:2px solid #ddd; border-radius:8px;
  font-size:22px; font-weight:700; cursor:pointer; transition:all 0.2s;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  -webkit-tap-highlight-color:transparent; user-select:none;
}
.scramble-tile:active { transform:scale(0.9); }
.scramble-tile.used { opacity:0.2; pointer-events:none; }

/* Learn Card */
.learn-card {
  background:linear-gradient(135deg, #E3F2FD, #FFF3E0); border-radius:var(--radius);
  padding:24px; width:100%; box-shadow:var(--shadow); margin:10px 0;
}
.learn-card h3 { margin-bottom:12px; color:var(--text); }
.learn-card .learn-content { font-size:17px; line-height:1.7; }
.learn-card .learn-content strong { color:var(--primary); }
.learn-card .learn-list { list-style:none; padding:0; }
.learn-card .learn-list li { padding:4px 0; padding-left:20px; position:relative; }
.learn-card .learn-list li::before { content:''; position:absolute; left:0; top:12px; width:8px; height:8px; border-radius:50%; }
.diff-badge {
  display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700;
  margin-left:8px; color:white; vertical-align:middle;
}
.diff-1 { background:var(--success); }
.diff-2 { background:var(--warning); }
.diff-3 { background:var(--error); }

/* Feedback */
.feedback-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); z-index:100; justify-content:center; align-items:center; padding:20px; }
.feedback-overlay.active { display:flex; }
.feedback-card { background:white; border-radius:var(--radius); padding:30px; text-align:center; max-width:400px; width:100%; box-shadow:var(--shadow-lg); animation:bubbleIn 0.3s; }
.feedback-stars { font-size:36px; margin:10px 0; }
.feedback-text { font-size:18px; margin:10px 0; }

/* World Complete */
.complete-stars-big { font-size:48px; margin:15px 0; }
.star-summary { display:flex; justify-content:center; gap:20px; margin:15px 0; }
.star-stat { text-align:center; }
.star-stat-num { font-size:32px; font-weight:900; }
.star-stat-label { font-size:13px; color:var(--text-light); }

/* Achievements */
.achievements-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; }
.achievement-card { background:var(--card); border-radius:var(--radius-sm); padding:14px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.06); transition:all 0.3s; }
.achievement-card.unlocked { border:2px solid var(--warning); background:linear-gradient(135deg,#FFF8E1,#FFF3E0); }
.achievement-card.locked { opacity:0.5; filter:grayscale(0.5); }
.achievement-icon { font-size:36px; margin-bottom:6px; }
.achievement-name { font-size:13px; font-weight:700; }
.achievement-desc { font-size:11px; color:var(--text-light); margin-top:2px; }

.bottom-nav { display:flex; gap:8px; width:100%; margin-top:auto; padding-top:15px; justify-content:center; flex-wrap:wrap; }

#confetti-canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:200; }

.achievement-popup {
  position:fixed; top:20px; left:50%; transform:translateX(-50%);
  background:linear-gradient(135deg,#FFD700,#FFA500);
  color:white; padding:14px 24px; border-radius:var(--radius);
  font-weight:700; font-size:16px; z-index:300;
  box-shadow:var(--shadow-lg); animation:slideDown 0.5s, slideUp 0.5s 2.5s forwards;
  text-align:center; max-width:90%;
}
@keyframes slideDown { from { transform:translateX(-50%) translateY(-100px); opacity:0; } to { transform:translateX(-50%) translateY(0); opacity:1; } }
@keyframes slideUp { from { transform:translateX(-50%) translateY(0); opacity:1; } to { transform:translateX(-50%) translateY(-100px); opacity:0; } }

.hint-btn { background:var(--warning); color:white; border:none; padding:8px 16px; border-radius:20px; font-size:14px; font-weight:600; cursor:pointer; margin-top:8px; }
.hint-text { background:#FEF9E7; border:2px solid var(--warning); border-radius:var(--radius-sm); padding:12px; margin-top:8px; font-size:15px; color:#7D6608; animation:bubbleIn 0.3s; }

.bounce { animation: bounce 1s infinite; }
@keyframes bounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
.pulse { animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.05); } }
.float { animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }

.reset-link { color:var(--text-light); font-size:13px; cursor:pointer; text-decoration:underline; margin-top:10px; }
.reset-link:hover { color:var(--error); }

@media (max-width:480px) {
  body { font-size:16px; }
  .screen { padding:12px; }
  h1 { font-size:24px; }
  .title-big { font-size:28px; }
  .btn { padding:12px 20px; font-size:18px; min-width:160px; }
  .q-option { padding:12px 14px; font-size:16px; }
  .character-svg { width:70px; height:70px; }
}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<!-- START SCREEN -->
<div id="start-screen" class="screen active">
  <div class="school-name">Frankensteinschule - 2. Klasse</div>
  <div class="title-big">Das Jahr</div>
  <h2>Lernspiel</h2>
  <div class="welcome-characters" id="welcome-chars"></div>
  <div id="profiles-container"></div>
  <div class="new-profile-row">
    <input type="text" id="new-player-name" placeholder="Neuer Name..." maxlength="20" autocomplete="off">
    <button class="btn btn-primary btn-small" onclick="createNewProfile()">+ Start</button>
  </div>
  <div class="reset-link" onclick="resetAllProfiles()">Alle Daten löschen</div>
</div>

<!-- MAP SCREEN -->
<div id="map-screen" class="screen">
  <div class="map-header">
    <div class="player-info"><span id="map-player-name"></span></div>
    <div class="total-stars" id="map-total-stars"></div>
  </div>
  <h2 style="margin-bottom:4px">Weltkarte</h2>
  <p class="subtitle" style="margin-bottom:12px">Wähle eine Welt!</p>
  <div class="world-grid" id="world-grid"></div>
  <div class="bottom-nav">
    <button class="btn btn-small btn-outline" onclick="showAchievements()">Abzeichen</button>
    <button class="btn btn-small btn-outline" onclick="goToStart()">Spieler wechseln</button>
  </div>
</div>

<!-- QUESTION SCREEN -->
<div id="question-screen" class="screen">
  <div class="q-header">
    <div class="q-world-badge" id="q-world-badge"></div>
    <div class="q-progress-text" id="q-progress-text"></div>
  </div>
  <div class="q-progress-bar"><div class="q-progress-fill" id="q-progress-fill"></div></div>
  <div id="q-content"></div>
  <div class="bottom-nav">
    <button class="btn btn-small btn-outline" onclick="backToMap()">Zur Karte</button>
  </div>
</div>

<!-- FEEDBACK OVERLAY -->
<div class="feedback-overlay" id="feedback-overlay">
  <div class="feedback-card" id="feedback-card"></div>
</div>

<!-- WORLD COMPLETE SCREEN -->
<div id="world-complete-screen" class="screen">
  <div id="world-complete-content"></div>
</div>

<!-- ACHIEVEMENTS SCREEN -->
<div id="achievements-screen" class="screen">
  <h2>Deine Abzeichen</h2>
  <p class="subtitle" id="ach-subtitle"></p>
  <div class="achievements-grid" id="achievements-grid"></div>
  <div class="bottom-nav">
    <button class="btn btn-small btn-primary" onclick="showScreen('map-screen'); renderMap();">Zurück zur Karte</button>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const PROFILES_KEY = 'frankensteinschule_profiles_v3';
const OLD_KEY = 'frankensteinschule_lernspiel_v2';

const WORLDS = [
  {id:1,name:"Mollys Wochentage-Wiese",char:'molly',color:'var(--w1)',colorHex:'#66BB6A',icon:'🌿'},
  {id:2,name:"Ellis Monate-Fluss",char:'elli',color:'var(--w2)',colorHex:'#42A5F5',icon:'🏞️'},
  {id:3,name:"Oktis Jahreszeiten-Ozean",char:'okti',color:'var(--w3)',colorHex:'#FFA726',icon:'🌊'},
  {id:4,name:"Blitzis Kalender-Koppel",char:'blitzi',color:'var(--w4)',colorHex:'#AB47BC',icon:'📅'},
  {id:5,name:"Datum-Dschungel",char:'all',color:'var(--w5)',colorHex:'#26A69A',icon:'🌴'},
  {id:6,name:"Weltraum-Abenteuer",char:'all',color:'var(--w6)',colorHex:'#283593',icon:'🚀'},
];

const CHARACTERS = {
  molly:{name:'Molly',type:'Hund',color:'#8B4513',
    correct:["Wuff! Super gemacht!","Toll, du bist ein Schlaukopf!","Wau, das war richtig!","Pfote hoch, das sitzt!"],
    wrong:["Hmm, versuch's nochmal!","Fast! Denk nochmal nach!","Das schaffen wir zusammen!","Schnüffel nochmal genau hin!"]},
  elli:{name:'Elli',type:'Eisvogel',color:'#1565C0',
    correct:["Piep piep, richtig!","Du bist so schnell wie ich!","Genau richtig, toll!","Volltreffer!"],
    wrong:["Nicht ganz, probier's nochmal!","Flieg nochmal drüber nach!","Gleich hast du es!","Schau nochmal genau hin!"]},
  okti:{name:'Okti',type:'Oktopus',color:'#7B1FA2',
    correct:["Blubb! Alle 8 Arme klatschen!","Fantastisch!","Du bist ein Genie!","Blubb blubb, perfekt!"],
    wrong:["Blubb, das war leider falsch!","Meine Tentakel helfen dir!","Nochmal versuchen!","Nicht aufgeben, du schaffst das!"]},

// ============================================================
// PROFILE & STATE MANAGEMENT
// ============================================================
let profiles = {};
let currentProfile = null;
let state = {};

const DEFAULT_STATE = {
  worldProgress:{}, achievements:[], streak:0,
  currentWorld:0, currentQuestions:[], currentQIndex:0, attempts:0, hintUsed:false, playDates:[]
};
// worldProgress[wid] = { history: { qid: [score, score] }, completed: false }
// score: 3 = 1st try, 1 = 2nd try, 0 = 3+ tries
// history stores last 2 scores per question (newest first)

function getQuestionScore(wp, qid) {
  const h = (wp.history||{})[qid];
  if (!h || h.length === 0) return null; // never answered
  const sum = h.reduce((a,b)=>a+b, 0);
  return sum / h.length; // average of last 2
}

function getWorldAvgStars(worldId) {
  const wp = state.worldProgress[worldId];
  if (!wp || !wp.history) return 0;
  const scores = Object.values(wp.history).map(h => h.reduce((a,b)=>a+b,0)/h.length);
  if (scores.length === 0) return 0;
  return scores.reduce((a,b)=>a+b,0) / scores.length;
}

function getWorldAnsweredCount(worldId) {
  const wp = state.worldProgress[worldId];
  if (!wp || !wp.history) return 0;
  return Object.keys(wp.history).length;
}

function isWorldAllAnswered(worldId) {
  // All questions answered at least once
  const allQ = getWorldQuestions(worldId);
  const wp = state.worldProgress[worldId];
  if (!wp || !wp.history) return false;
  return allQ.every(q => wp.history[q.id] && wp.history[q.id].length > 0);
}

function isWorldMastered(worldId) {
  // All questions have 2 entries in history AND both are 3 (=first try)
  const allQ = getWorldQuestions(worldId);
  const wp = state.worldProgress[worldId];
  if (!wp || !wp.history) return false;
  return allQ.every(q => {
    const h = wp.history[q.id];
    return h && h.length >= 2 && h[0] === 3 && h[1] === 3;
  });
}

function migrateWorldProgress(wp) {
  // Migrate old stars-based format to history-based
  if (wp.stars && !wp.history) {
    wp.history = {};
    for (const [qid, score] of Object.entries(wp.stars)) {
      wp.history[qid] = [score]; // single entry from old system
    }
    delete wp.stars;
    delete wp.questions;
  }
  if (!wp.history) wp.history = {};
  return wp;
}

function loadProfiles() {
  try {
    profiles = JSON.parse(localStorage.getItem(PROFILES_KEY) || '{}');
    // Migrate old single-profile data
    const old = localStorage.getItem(OLD_KEY);
    if (old && Object.keys(profiles).length === 0) {
      const oldState = JSON.parse(old);
      const name = oldState.playerName || 'Spieler';
      profiles[name] = oldState;
      saveProfiles();
      localStorage.removeItem(OLD_KEY);
    }
  } catch(e) { profiles = {}; }
}

function saveProfiles() {
  try {
    if (currentProfile && state) profiles[currentProfile] = state;
    localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles));
  } catch(e) {}
}

function saveState() { saveProfiles(); }

function selectProfile(name) {
  currentProfile = name;
  state = profiles[name];
  // Migrate all worldProgress to history format
  for (const wid of Object.keys(state.worldProgress||{})) {
    state.worldProgress[wid] = migrateWorldProgress(state.worldProgress[wid]);
  }
  saveProfiles();
  recordPlayDate();
  initWorldProgress();
  showScreen('map-screen'); renderMap();
}

function createNewProfile() {
  const input = document.getElementById('new-player-name');
  const name = input.value.trim();
  if (!name) { input.style.borderColor='var(--error)'; input.focus(); return; }
  if (profiles[name]) { selectProfile(name); return; }
  soundClick();
  profiles[name] = JSON.parse(JSON.stringify(DEFAULT_STATE));
  currentProfile = name;
  state = profiles[name];
  saveProfiles();
  initWorldProgress();
  showScreen('map-screen');
  renderMap();
}

function deleteProfile(name, ev) {
  ev.stopPropagation();
  if (!confirm(`"${name}" wirklich löschen? Der Fortschritt geht verloren!`)) return;
  delete profiles[name];
  if (currentProfile === name) { currentProfile = null; state = {}; }
  saveProfiles();
  renderStartScreen();
}

function resetAllProfiles() {
  if (!confirm('Wirklich ALLE Spielerdaten löschen?')) return;
  localStorage.removeItem(PROFILES_KEY);
  localStorage.removeItem(OLD_KEY);
  location.reload();
}

function goToStart() {
  soundClick();
  currentProfile = null;
  showScreen('start-screen');
  renderStartScreen();
}

function recordPlayDate() {
  const today = new Date().toISOString().split('T')[0];
  if (!state.playDates) state.playDates = [];
  if (!state.playDates.includes(today)) {
    state.playDates.push(today);
    saveState();
    checkAchievement('fleissige_biene');
  }
}

function starHTML(count, size='') {
  const sz = size==='big'?'font-size:48px;':'font-size:36px;';
  const filled = '⭐'.repeat(Math.max(0,Math.min(3,count)));
  const empty = '<span style="opacity:0.15;filter:grayscale(1)">⭐</span>'.repeat(Math.max(0,3-count));
  return `<span style="${sz}">${filled}${empty}</span>`;
}

  const filled = '⭐'.repeat(Math.max(0,Math.min(3,count)));
  const empty = '<span style="opacity:0.15;filter:grayscale(1)">⭐</span>'.repeat(Math.max(0,3-count));
  return filled+empty;
}

function getAudioCtx() { if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playTone(f,d,t='sine',v=.15){try{const c=getAudioCtx();const o=c.createOscillator();const g=c.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start(c.currentTime);o.stop(c.currentTime+d);}catch(e){}}
function soundCorrect(){playTone(523,.15);setTimeout(()=>playTone(659,.15),100);setTimeout(()=>playTone(784,.2),200);}

function launchConfetti(duration=2000){
  const canvas=document.getElementById('confetti-canvas');const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const particles=[];const colors=['#FF6B35','#4ECDC4','#2ECC71','#E74C3C','#F39C12','#9B59B6','#3498DB','#FFD700'];
  for(let i=0;i<80;i++){particles.push({x:Math.random()*canvas.width,y:-20-Math.random()*200,vx:(Math.random()-.5)*6,vy:Math.random()*4+2,size:Math.random()*8+4,color:colors[Math.floor(Math.random()*colors.length)],rotation:Math.random()*360,rotationSpeed:(Math.random()-.5)*10});}
  const start=Date.now();
  function animate(){if(Date.now()-start>duration+2000){ctx.clearRect(0,0,canvas.width,canvas.height);return;}ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.rotation+=p.rotationSpeed;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rotation*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*.6);ctx.restore();});requestAnimationFrame(animate);}
  animate();
}

function renderMap() {
  document.getElementById('map-player-name').textContent = currentProfile;
  // Total stars across all worlds (average * answered count, displayed as sum)
  let globalAvg = 0; let globalCount = 0;
  WORLDS.forEach(w => { const a = getWorldAnsweredCount(w.id); if(a>0){ globalAvg += getWorldAvgStars(w.id)*a; globalCount += a; }});
  const totalAvg = globalCount>0 ? globalAvg/globalCount : 0;
  document.getElementById('map-total-stars').innerHTML = starHTMLSmall(Math.round(totalAvg));

  document.getElementById('world-grid').innerHTML = WORLDS.map((w, i) => {
    const wp = state.worldProgress[w.id]||{history:{},completed:false};
    const unlocked = i===0||(state.worldProgress[WORLDS[i-1].id]&&state.worldProgress[WORLDS[i-1].id].completed);
    const allQ = getWorldQuestions(w.id);
    const answered = getWorldAnsweredCount(w.id);
    const avgStars = getWorldAvgStars(w.id);
    const coveragePct = allQ.length>0?Math.round(answered/allQ.length*100):0;
    const charName = w.char==='all'?'molly':w.char;
    const mastered = isWorldMastered(w.id);
    const allDone = isWorldAllAnswered(w.id);
    const starDisplay = answered>0 ? starHTMLSmall(Math.round(avgStars)) : '';
    return `<div class="world-card ${unlocked?'':'locked'} ${wp.completed?'completed':''} ${mastered?'mastered':''}"
           onclick="${unlocked?`startWorld(${w.id})`:''}" style="border-top:4px solid ${w.colorHex}">
        <div class="world-num" style="background:${w.colorHex}">${w.id}</div>
        ${mastered?'<div style="position:absolute;top:6px;right:8px;font-size:22px" title="Gemeistert!">👑</div>':''}
        <div style="margin-top:6px">${charSVG(charName,'small')}</div>
        <div class="world-title">${w.name.split(' ').slice(-1)[0]}</div>
        <div class="world-subtitle">${w.icon} ${w.name.split(' ').slice(0,-1).join(' ')}</div>
        <div class="world-bottom">
          <div class="world-stars">${starDisplay}</div>
          <div class="world-progress"><div class="world-progress-fill" style="width:${coveragePct}%;background:${w.colorHex}"></div></div>
          <div style="font-size:11px;color:${allDone?'var(--success)':'var(--text-light)'};margin-top:4px">${answered}/${allQ.length} Fragen${allDone?' ✓':''}</div>
        </div>
        ${!unlocked?'<div class="lock-icon">🔒</div>':''}
      </div>`;
  }).join('');
}

// ============================================================
// ADAPTIVE QUESTION SELECTION (with difficulty)
// ============================================================
function getWorldQuestions(worldId) { return QUESTIONS.filter(q=>q.w===worldId); }

function selectQuestionsForWorld(worldId) {
  const allQ = getWorldQuestions(worldId);
  const wp = migrateWorldProgress(state.worldProgress[worldId]||{history:{},completed:false});
  state.worldProgress[worldId] = wp;

  // Categorize all questions
  const unanswered = allQ.filter(q => !wp.history[q.id]);
  const poor = allQ.filter(q => wp.history[q.id] && getQuestionScore(wp,q.id) < 2);
  const ok = allQ.filter(q => wp.history[q.id] && getQuestionScore(wp,q.id) >= 2 && getQuestionScore(wp,q.id) < 3);
  const perfect = allQ.filter(q => wp.history[q.id] && getQuestionScore(wp,q.id) >= 3);

  let selected = [];

  // Show learn card on first visit (no questions answered yet)
  if (unanswered.length === allQ.length && LERNKARTEN[worldId]) {
    selected.push(LERNKARTEN[worldId]);
  }

  const targetCount = 10;

  // SMART SELECTION:
  // 1. Guarantee at least 1 new unanswered question (if any exist)
  // 2. Then fill with poorly answered (score < 2)
  // 3. Then ok answers (score 2-2.9)
  // 4. Then perfect (score 3) as review
  const pool = [];

  // At least half of the round should be new questions (if available)
  const newQ = shuffle(unanswered);
  const newCount = Math.min(newQ.length, Math.ceil(targetCount / 2));
  pool.push(...newQ.slice(0, newCount));

  // Fill with poor answers (priority!)
  pool.push(...shuffle(poor));

  // Then ok answers
  pool.push(...shuffle(ok));

  // Then perfect answers as review
  pool.push(...shuffle(perfect).filter(q => !pool.includes(q)));

  // Select up to targetCount, sort easy → medium → hard
  const picked = pool.filter(q => !selected.includes(q)).slice(0, targetCount);
  picked.sort((a,b) => a.diff - b.diff);
  selected.push(...picked);

  // Ensure minimum 3 actual questions
  const actual = selected.filter(q => q.type !== 'learn');
  if (actual.length < 3) {
    const remaining = allQ.filter(q => !selected.includes(q));
    selected.push(...shuffle(remaining).slice(0, 3 - actual.length));
  }

  return selected;
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ============================================================
// WORLD START
// ============================================================
function startWorld(worldId) {
  soundClick();
  state.currentWorld = worldId;
  state.currentQuestions = selectQuestionsForWorld(worldId);
  state.currentQIndex = 0; state.attempts = 0; state.hintUsed = false;
  if(!state.worldProgress[worldId]) state.worldProgress[worldId]={history:{},completed:false};
  state.worldProgress[worldId] = migrateWorldProgress(state.worldProgress[worldId]);
  saveState(); showScreen('question-screen'); renderQuestion();
}

function backToMap() { soundClick(); showScreen('map-screen'); renderMap(); }

// ============================================================
// RENDER QUESTION
// ============================================================
function renderQuestion() {
  if (state.currentQIndex >= state.currentQuestions.length) { finishWorld(); return; }

  const q = state.currentQuestions[state.currentQIndex];
  const world = WORLDS.find(w=>w.id===state.currentWorld);
  const charName = world.char==='all'?['molly','elli','okti','blitzi'][state.currentQIndex%4]:world.char;
  const char = CHARACTERS[charName];

  document.getElementById('q-world-badge').textContent = world.name;
  document.getElementById('q-world-badge').style.background = world.colorHex;
  document.getElementById('q-progress-text').textContent = `${state.currentQIndex+1} / ${state.currentQuestions.length}`;
  const fill = document.getElementById('q-progress-fill');
  fill.style.width = (state.currentQIndex/state.currentQuestions.length*100)+'%';
  fill.style.background = world.colorHex;

  state.attempts = 0; state.hintUsed = false;
  const content = document.getElementById('q-content');

  // ---- LEARN CARD ----
  if (q.type === 'learn') {
    content.innerHTML = `
      <div class="q-character-row">
        <div class="character-container">${charSVG(charName,'small')}</div>
        <div class="q-bubble" style="border-left:3px solid ${world.colorHex}">Lass mich dir etwas erklären!</div>
      </div>
      <div class="learn-card">
        <h3>📖 ${q.title}</h3>
        <div class="learn-content">${q.content}</div>
      </div>
      <button class="btn btn-primary" onclick="nextQuestion()" style="margin-top:15px">Verstanden! Weiter!</button>
    `;
    return;
  }

  // ---- REGULAR QUESTIONS ----
  const diffLabel = q.diff===1?'Leicht':q.diff===2?'Mittel':'Schwer';
  const diffClass = 'diff-'+q.diff;

  let questionHTML = `
    <div class="q-character-row">
      <div class="character-container">${charSVG(charName,'small')}</div>
      <div class="q-bubble" style="border-left:3px solid ${world.colorHex}">${q.q} <span class="diff-badge ${diffClass}">${diffLabel}</span></div>
    </div>
  `;

  if(q.type==='mc'){
    const opts=shuffle([...q.opts]);
    questionHTML+=`<div class="q-options">${opts.map(opt=>`<div class="q-option" onclick="checkMC(this,'${esc(opt)}','${esc(q.ans)}')">${opt}</div>`).join('')}</div>`;
  } else if(q.type==='tf'){
    questionHTML+=`<div class="tf-options"><div class="tf-option" onclick="checkTF(this,true,${q.ans})" style="border-color:var(--success)">✓ Richtig</div><div class="tf-option" onclick="checkTF(this,false,${q.ans})" style="border-color:var(--error)">✗ Falsch</div></div>`;
  } else if(q.type==='fill'){
    questionHTML+=`<div class="fill-container"><div class="fill-sentence">${q.q.replace('___','<span class="fill-blank" id="fill-blank"></span>')}</div><input type="text" class="fill-input" id="fill-input" placeholder="Deine Antwort..." autocomplete="off" autocapitalize="off"><div style="margin-top:10px"><button class="btn btn-primary btn-small" onclick="checkFill('${esc(q.ans)}')">Prüfen!</button></div></div>`;
  } else if(q.type==='sort'){
    const shuffled=shuffle([...q.items]);
    questionHTML+=`<div class="sort-slots" id="sort-slots"></div><div class="sort-items" id="sort-items">${shuffled.map(item=>`<div class="sort-item" onclick="addSortItem(this,'${esc(item)}')" style="background:${world.colorHex}">${item}</div>`).join('')}</div><div style="margin-top:10px;display:flex;gap:8px;justify-content:center"><button class="btn btn-small btn-outline" onclick="resetSort()">Zurücksetzen</button><button class="btn btn-small btn-primary" onclick="checkSort()">Prüfen!</button></div>`;
    window._sortAnswer=q.items; window._sortCurrent=[];
  } else if(q.type==='scramble'){
    const letters=shuffle(q.word.split(''));
    questionHTML+=`<div class="scramble-display" id="scramble-display">${q.word.split('').map(()=>'<div class="scramble-empty"></div>').join('')}</div><div class="scramble-tiles" id="scramble-tiles">${letters.map((l,i)=>`<div class="scramble-tile" onclick="addScrambleLetter(this,'${l}',${i})">${l}</div>`).join('')}</div><div style="margin-top:10px"><button class="btn btn-small btn-outline" onclick="resetScramble()">Zurücksetzen</button></div>`;
    window._scrambleAnswer=q.word; window._scrambleCurrent=[];
  }

  if(q.hint){questionHTML+=`<div style="text-align:center"><button class="hint-btn" onclick="showHint(this)">💡 Tipp anzeigen</button><div class="hint-text" id="hint-text" style="display:none">${q.hint}</div></div>`;}
  content.innerHTML=questionHTML;
  if(q.type==='fill')setTimeout(()=>{const inp=document.getElementById('fill-input');if(inp)inp.focus();},300);
}

function esc(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function showHint(btn){state.hintUsed=true;document.getElementById('hint-text').style.display='block';btn.style.display='none';soundClick();}

// ============================================================
// ANSWER CHECKING (same logic as before)
// ============================================================
function checkMC(el,chosen,correct){
  if(el.classList.contains('correct')||el.classList.contains('wrong'))return;
  state.attempts++;
  if(chosen===correct){el.classList.add('correct');el.parentElement.querySelectorAll('.q-option').forEach(o=>{if(o!==el)o.style.pointerEvents='none';});onCorrect();}
  else{el.classList.add('wrong');soundWrong();el.style.pointerEvents='none';if(state.attempts>=3){el.parentElement.querySelectorAll('.q-option').forEach(o=>{if(o.textContent===correct)o.classList.add('correct');o.style.pointerEvents='none';});setTimeout(()=>onCorrect(),800);}}
}
function checkTF(el,chosen,correct){
  if(el.classList.contains('correct')||el.classList.contains('wrong'))return;
  state.attempts++;const opts=el.parentElement.querySelectorAll('.tf-option');
  if(chosen===correct){el.classList.add('correct');el.style.background='#E8F8F0';opts.forEach(o=>o.style.pointerEvents='none');onCorrect();}
  else{el.classList.add('wrong');el.style.background='#FDEDEC';soundWrong();opts.forEach(o=>{const isC=(o.textContent.includes('Richtig')&&correct)||(o.textContent.includes('Falsch')&&!correct);if(isC){o.classList.add('correct');o.style.background='#E8F8F0';}o.style.pointerEvents='none';});setTimeout(()=>onCorrect(),800);}
}
function checkFill(correct){
  const input=document.getElementById('fill-input');const val=input.value.trim();if(!val)return;
  state.attempts++;
  if(val.toLowerCase()===correct.toLowerCase()){input.style.borderColor='var(--success)';input.style.background='#E8F8F0';input.disabled=true;const b=document.getElementById('fill-blank');if(b)b.textContent=correct;onCorrect();}
  else{input.style.borderColor='var(--error)';input.style.background='#FDEDEC';soundWrong();if(state.attempts>=3){input.value=correct;input.style.borderColor='var(--success)';input.style.background='#E8F8F0';input.disabled=true;const b=document.getElementById('fill-blank');if(b)b.textContent=correct;setTimeout(()=>onCorrect(),800);}else{setTimeout(()=>{input.style.borderColor='#ddd';input.style.background='white';input.value='';input.focus();},600);}}
}

// Sort
window._sortCurrent=[];window._sortAnswer=[];
function addSortItem(el,item){soundClick();if(el.classList.contains('used'))return;el.classList.add('used');window._sortCurrent.push(item);renderSortSlots();}
function removeSortItem(i){soundClick();const r=window._sortCurrent.splice(i,1)[0];document.querySelectorAll('#sort-items .sort-item').forEach(el=>{if(el.textContent===r&&el.classList.contains('used'))el.classList.remove('used');});renderSortSlots();}
function renderSortSlots(){document.getElementById('sort-slots').innerHTML=window._sortCurrent.map((item,i)=>`<div class="sort-slot" onclick="removeSortItem(${i})">${item}</div>`).join('')||'<span style="color:#aaa;font-size:14px;padding:8px">Klicke die Elemente in der richtigen Reihenfolge an!</span>';}
function resetSort(){soundClick();window._sortCurrent=[];document.querySelectorAll('#sort-items .sort-item').forEach(el=>el.classList.remove('used'));renderSortSlots();}
function checkSort(){
  if(window._sortCurrent.length!==window._sortAnswer.length)return;state.attempts++;
  if(JSON.stringify(window._sortCurrent)===JSON.stringify(window._sortAnswer)){document.getElementById('sort-slots').style.borderColor='var(--success)';document.getElementById('sort-slots').style.background='#E8F8F0';onCorrect();}
  else{soundWrong();document.getElementById('sort-slots').style.borderColor='var(--error)';document.getElementById('sort-slots').style.background='#FDEDEC';if(state.attempts>=3){window._sortCurrent=[...window._sortAnswer];renderSortSlots();document.getElementById('sort-slots').style.borderColor='var(--success)';document.getElementById('sort-slots').style.background='#E8F8F0';document.querySelectorAll('#sort-items .sort-item').forEach(el=>el.classList.add('used'));setTimeout(()=>onCorrect(),800);}else{setTimeout(()=>{document.getElementById('sort-slots').style.borderColor='#ddd';document.getElementById('sort-slots').style.background='#f5f5f5';resetSort();},600);}}
}

// Scramble
window._scrambleCurrent=[];window._scrambleAnswer='';
function addScrambleLetter(el,letter,index){soundClick();if(el.classList.contains('used'))return;el.classList.add('used');window._scrambleCurrent.push({letter,index});renderScrambleDisplay();if(window._scrambleCurrent.length===window._scrambleAnswer.length)setTimeout(()=>checkScramble(),300);}
function removeScrambleLetter(pos){soundClick();const r=window._scrambleCurrent.splice(pos,1)[0];document.querySelectorAll('#scramble-tiles .scramble-tile')[r.index].classList.remove('used');renderScrambleDisplay();}
function renderScrambleDisplay(){const d=document.getElementById('scramble-display');const w=window._scrambleAnswer;d.innerHTML='';for(let i=0;i<w.length;i++){if(i<window._scrambleCurrent.length)d.innerHTML+=`<div class="scramble-placed" onclick="removeScrambleLetter(${i})">${window._scrambleCurrent[i].letter}</div>`;else d.innerHTML+='<div class="scramble-empty"></div>';}}
function resetScramble(){soundClick();window._scrambleCurrent=[];document.querySelectorAll('#scramble-tiles .scramble-tile').forEach(el=>el.classList.remove('used'));renderScrambleDisplay();}
function checkScramble(){
  state.attempts++;const word=window._scrambleCurrent.map(c=>c.letter).join('');
  if(word===window._scrambleAnswer){document.querySelectorAll('.scramble-placed').forEach(el=>{el.style.background='var(--success)';el.style.pointerEvents='none';});onCorrect();}
  else{soundWrong();document.querySelectorAll('.scramble-placed').forEach(el=>{el.style.background='var(--error)';});if(state.attempts>=3){window._scrambleCurrent=window._scrambleAnswer.split('').map((l,i)=>({letter:l,index:i}));renderScrambleDisplay();document.querySelectorAll('.scramble-placed').forEach(el=>{el.style.background='var(--success)';el.style.pointerEvents='none';});setTimeout(()=>onCorrect(),800);}else{setTimeout(resetScramble,600);}}
}

// ============================================================
// ON CORRECT + FEEDBACK
// ============================================================
function onCorrect(){
  soundCorrect();
  const q=state.currentQuestions[state.currentQIndex];
  const world=WORLDS.find(w=>w.id===state.currentWorld);
  const charName=world.char==='all'?['molly','elli','okti','blitzi'][state.currentQIndex%4]:world.char;
  const char=CHARACTERS[charName];

  // Score: 1st try=3, 2nd try=2, 3rd try=1, shown answer=0
  let stars=0;
  if(state.attempts===1 && !state.hintUsed) stars=3;
  else if(state.attempts===1) stars=2; // used hint
  else if(state.attempts===2) stars=2;
  else if(state.attempts===3) stars=1;
  else stars=0;

  const wp=state.worldProgress[state.currentWorld];
  if(!wp.history) wp.history={};
  // Store in history (keep last 2 attempts, newest first)
  if(!wp.history[q.id]) wp.history[q.id]=[];
  wp.history[q.id].unshift(stars);
  if(wp.history[q.id].length>2) wp.history[q.id]=wp.history[q.id].slice(0,2);

  if(state.attempts===1&&!state.hintUsed){state.streak++;checkAchievement('blitzschnell');}else{state.streak=0;}
  saveState();

  const comment=char.correct[Math.floor(Math.random()*char.correct.length)];
  const isLast=state.currentQIndex>=state.currentQuestions.length-1;

  document.getElementById('feedback-card').innerHTML=`
    <div>${charSVG(charName,'small')}</div>
    <div class="feedback-stars">${starHTML(stars)}</div>
    <div class="feedback-text">${comment}</div>
    ${stars===3?'<div style="font-size:14px;color:var(--success);margin-top:4px">Beim 1. Versuch! 🎉</div>':stars===2?'<div style="font-size:14px;color:var(--warning);margin-top:4px">Fast perfekt!</div>':stars===1?'<div style="font-size:14px;color:var(--text-light);margin-top:4px">Knapp geschafft!</div>':'<div style="font-size:14px;color:var(--text-light);margin-top:4px">Übung macht den Meister!</div>'}
    <button class="btn btn-primary" onclick="nextQuestion()" style="margin-top:15px">${isLast?'Ergebnis anzeigen!':'Weiter!'}</button>
  `;
  document.getElementById('feedback-overlay').classList.add('active');
  if(stars===3)launchConfetti(1000);
}

function nextQuestion(){
  document.getElementById('feedback-overlay').classList.remove('active');
  state.currentQIndex++;saveState();renderQuestion();
}

// ============================================================
// WORLD COMPLETE
// ============================================================
function finishWorld(){
  const world=WORLDS.find(w=>w.id===state.currentWorld);
  const wp=state.worldProgress[state.currentWorld];
  const allQ=getWorldQuestions(state.currentWorld);
  const answered=getWorldAnsweredCount(state.currentWorld);
  const avgStars=getWorldAvgStars(state.currentWorld);
  const roundedStars=Math.round(avgStars);
  wp.completed=true;
  saveState();
  checkWorldAchievement(state.currentWorld);checkAchievement('durchhalte_champion');checkAchievement('alle_beantwortet');checkAchievement('perfektionist');
  launchConfetti(2500);soundAchievement();
  const charName=world.char==='all'?'molly':world.char;
  let msg="Nicht schlecht! Versuch es nochmal, dann wird es noch besser! 💪";
  if(avgStars>=2.5)msg="Wow, das war fantastisch! Du bist ein echter Profi! 🌟";
  else if(avgStars>=1.5)msg="Super gemacht! Du hast wirklich viel gelernt! 💪";
  else if(avgStars>=0.5)msg="Gut gemacht! Übung macht den Meister! 😊";

  document.getElementById('world-complete-content').innerHTML=`
    <div style="text-align:center">
      <h2 style="margin-bottom:5px">${world.icon} ${world.name}</h2><p class="subtitle">Geschafft!</p>
      <div class="character-container">${charSVG(charName)}</div>
      <div class="speech-bubble" style="margin:10px auto">${msg}</div>
      <div class="complete-stars-big">${starHTML(roundedStars,'big')}</div>
      <div class="star-summary">
        <div class="star-stat"><div class="star-stat-num" style="color:var(--warning)">${starHTMLSmall(roundedStars)}</div><div class="star-stat-label">Bewertung</div></div>
        <div class="star-stat"><div class="star-stat-num" style="color:var(--success)">${answered}/${allQ.length}</div><div class="star-stat-label">Fragen</div></div>
      </div>
      ${answered<allQ.length?`<p style="font-size:14px;color:var(--text-light);margin-top:8px">Noch ${allQ.length-answered} neue Fragen warten auf dich!</p>`:'<p style="font-size:14px;color:var(--success);margin-top:8px">Alle Fragen beantwortet! Spiele nochmal um deine Sterne zu verbessern!</p>'}
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:15px">
        <button class="btn btn-primary" onclick="showScreen('map-screen');renderMap();">Zur Weltkarte</button>
        <button class="btn btn-secondary" onclick="startWorld(${state.currentWorld})">Nochmal üben</button>
      </div>
    </div>`;
  showScreen('world-complete-screen');
}

// ============================================================
// ACHIEVEMENTS
// ============================================================
function checkWorldAchievement(wid){
  const m={1:'wochentage_meister',2:'monats_experte',3:'jahreszeiten_profi',4:'kalender_koenig',5:'datum_detektiv',6:'weltraum_forscher'};
  const a=m[wid];if(!a||state.achievements.includes(a))return;
  const allQ=getWorldQuestions(wid);const wp=state.worldProgress[wid];
  if(getWorldAnsweredCount(wid)>=allQ.length*0.8)unlockAchievement(a);
}
function checkAchievement(id){
  if(state.achievements.includes(id))return;
  if(id==='blitzschnell'&&state.streak>=5)unlockAchievement(id);
  if(id==='durchhalte_champion'&&WORLDS.every(w=>state.worldProgress[w.id]&&state.worldProgress[w.id].completed))unlockAchievement(id);
  if(id==='alle_beantwortet'&&QUESTIONS.every(q=>{const wp=state.worldProgress[q.w];return wp&&wp.history&&wp.history[q.id]&&wp.history[q.id].length>0;}))unlockAchievement(id);
  if(id==='perfektionist'&&QUESTIONS.every(q=>{const wp=state.worldProgress[q.w];return wp&&wp.history&&wp.history[q.id]&&wp.history[q.id].length>=2&&wp.history[q.id][0]===3&&wp.history[q.id][1]===3;}))unlockAchievement(id);
  if(id==='fleissige_biene'){const d=(state.playDates||[]).sort();for(let i=d.length-3;i>=0;i--){const d1=new Date(d[i]),d2=new Date(d[i+1]),d3=new Date(d[i+2]);if((d2-d1)/864e5===1&&(d3-d2)/864e5===1){unlockAchievement(id);break;}}}
}
function unlockAchievement(id){
  if(state.achievements.includes(id))return;state.achievements.push(id);saveState();soundAchievement();launchConfetti(1500);
  const a=ACHIEVEMENTS.find(x=>x.id===id);if(!a)return;
  const p=document.createElement('div');p.className='achievement-popup';p.innerHTML=`${a.icon} Neues Abzeichen: ${a.name}!`;document.body.appendChild(p);setTimeout(()=>p.remove(),3500);
}
function showAchievements(){
  soundClick();showScreen('achievements-screen');
  document.getElementById('ach-subtitle').textContent=`${state.achievements.length} von ${ACHIEVEMENTS.length} Abzeichen freigeschaltet`;
  document.getElementById('achievements-grid').innerHTML=ACHIEVEMENTS.map(a=>`<div class="achievement-card ${state.achievements.includes(a.id)?'unlocked':'locked'}"><div class="achievement-icon">${a.icon}</div><div class="achievement-name">${a.name}</div><div class="achievement-desc">${a.desc}</div></div>`).join('');
}

// ============================================================
// ENTER KEY
// ============================================================
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('start-screen').classList.contains('active')){createNewProfile();return;}
    const fi=document.getElementById('fill-input');if(fi&&!fi.disabled){const q=state.currentQuestions[state.currentQIndex];if(q&&q.type==='fill')checkFill(q.ans);}
  }
});

// ============================================================
// INIT
// ============================================================
loadProfiles();
renderStartScreen();
showScreen('start-screen');
</script>
